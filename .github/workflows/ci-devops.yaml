name: "CI - Build and Deploy Frontend"

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}

      - name: Update kubernetes manifest
        run: |
          sed -i "s|image: .*frontend.*|image: ghcr.io/${{ github.repository_owner }}/frontend:${{ github.sha }}|g" release/kubernetes-manifests.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add release/kubernetes-manifests.yaml
          git commit -m "ci: update frontend image to ${{ github.sha }}"
          git push
